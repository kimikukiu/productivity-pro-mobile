AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Cloud Posture Scanner - Serverless AWS Security Posture Management Tool.
  Deploys API Gateway, 4 Lambda functions, DynamoDB table, and IAM role.
  Cost: $0 on AWS Free Tier.

# ============================================================
# PARAMETERS
# ============================================================
Parameters:
  Region:
    Type: String
    Default: us-east-1
    Description: AWS region to scan (must match deployment region)
  Stage:
    Type: String
    Default: prod
    Description: API Gateway deployment stage name

# ============================================================
# RESOURCES
# ============================================================
Resources:

  # ----------------------------------------------------------
  # 1. IAM ROLE FOR ALL LAMBDA FUNCTIONS
  # ----------------------------------------------------------
  CloudPostureScannerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CloudPostureScannerRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudPostureScannerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EC2ReadOnly
                Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeRegions
                Resource: "*"
              - Sid: S3ReadOnly
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:GetBucketEncryption
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketLocation
                  - s3:GetBucketPolicy
                Resource: "*"
              - Sid: IAMReadOnly
                Effect: Allow
                Action:
                  - iam:GetAccountSummary
                  - iam:ListUsers
                  - iam:GetAccountPasswordPolicy
                Resource: "*"
              - Sid: CloudTrailReadOnly
                Effect: Allow
                Action:
                  - cloudtrail:DescribeTrails
                  - cloudtrail:GetTrailStatus
                Resource: "*"
              - Sid: DynamoDBReadWrite
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource: !GetAtt ScanResultsTable.Arn
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  # ----------------------------------------------------------
  # 2. DYNAMODB TABLE
  # ----------------------------------------------------------
  ScanResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: scan_results
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: resource_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: resource_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true

  # ----------------------------------------------------------
  # 3. LAMBDA FUNCTIONS
  # ----------------------------------------------------------

  DiscoverEC2Lambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: discover_ec2_lambda
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt CloudPostureScannerRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          AWS_REGION_TARGET: !Ref Region
      Code:
        ZipFile: |
          import boto3
          import json
          import os
          from datetime import datetime
          
          REGION = os.environ.get('AWS_REGION_TARGET', 'us-east-1')
          
          
          def lambda_handler(event, context):
              ec2 = boto3.client('ec2', region_name=REGION)
          
              try:
                  response = ec2.describe_instances()
                  instances = []
          
                  for reservation in response['Reservations']:
                      for instance in reservation['Instances']:
                          security_groups = [
                              {'id': sg['GroupId'], 'name': sg['GroupName']}
                              for sg in instance.get('SecurityGroups', [])
                          ]
          
                          # Extract Name tag if present
                          name_tag = next(
                              (tag['Value'] for tag in instance.get('Tags', []) if tag['Key'] == 'Name'),
                              'Unnamed'
                          )
          
                          instances.append({
                              'instance_id': instance['InstanceId'],
                              'instance_name': name_tag,
                              'instance_type': instance['InstanceType'],
                              'region': REGION,
                              'public_ip': instance.get('PublicIpAddress', None),
                              'private_ip': instance.get('PrivateIpAddress', None),
                              'state': instance['State']['Name'],
                              'security_groups': security_groups,
                              'launch_time': instance['LaunchTime'].isoformat(),
                              'ami_id': instance.get('ImageId', 'N/A'),
                              'vpc_id': instance.get('VpcId', 'N/A'),
                          })
          
                  return {
                      'statusCode': 200,
                      'headers': {
                          'Access-Control-Allow-Origin': '*',
                          'Access-Control-Allow-Methods': 'GET,OPTIONS',
                          'Content-Type': 'application/json'
                      },
                      'body': json.dumps({
                          'instances': instances,
                          'count': len(instances),
                          'region': REGION,
                          'timestamp': datetime.utcnow().isoformat() + 'Z'
                      })
                  }
          
              except Exception as e:
                  print(f"[ERROR] discover_ec2_lambda failed: {str(e)}")
                  return {
                      'statusCode': 500,
                      'headers': {
                          'Access-Control-Allow-Origin': '*',
                          'Content-Type': 'application/json'
                      },
                      'body': json.dumps({
                          'error': 'Failed to discover EC2 instances',
                          'detail': str(e)
                      })
                  }

  DiscoverS3Lambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: discover_s3_lambda
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt CloudPostureScannerRole.Arn
      Timeout: 15
      MemorySize: 128
      Environment:
        Variables:
          AWS_REGION_TARGET: !Ref Region
      Code:
        ZipFile: |
          import boto3
          import json
          import os
          from datetime import datetime
          from botocore.exceptions import ClientError
          
          def lambda_handler(event, context):
              s3 = boto3.client('s3')
              buckets_info = []
          
              try:
                  response = s3.list_buckets()
                  buckets = response.get('Buckets', [])
          
                  for bucket in buckets:
                      bucket_name = bucket['Name']
                      created = bucket['CreationDate'].isoformat()
          
                      # --- Region ---
                      try:
                          location = s3.get_bucket_location(Bucket=bucket_name)
                          region = location['LocationConstraint'] or 'us-east-1'
                      except ClientError:
                          region = 'unknown'
          
                      # --- Encryption ---
                      try:
                          enc = s3.get_bucket_encryption(Bucket=bucket_name)
                          rules = enc['ServerSideEncryptionConfiguration']['Rules']
                          algo = rules[0]['ApplyServerSideEncryptionByDefault']['SSEAlgorithm']
                          encryption_status = 'ENABLED'
                          encryption_type = algo  # e.g. AES256, aws:kms
                      except ClientError as e:
                          if e.response['Error']['Code'] == 'ServerSideEncryptionConfigurationNotFoundError':
                              encryption_status = 'DISABLED'
                              encryption_type = 'NONE'
                          else:
                              encryption_status = 'UNKNOWN'
                              encryption_type = 'UNKNOWN'
          
                      # --- Public Access Block ---
                      try:
                          pab = s3.get_public_access_block(Bucket=bucket_name)
                          cfg = pab['PublicAccessBlockConfiguration']
                          all_blocked = all([
                              cfg.get('BlockPublicAcls', False),
                              cfg.get('BlockPublicPolicy', False),
                              cfg.get('IgnorePublicAcls', False),
                              cfg.get('RestrictPublicBuckets', False)
                          ])
                          access_policy = 'PRIVATE' if all_blocked else 'PUBLIC'
                          public_access_config = cfg
                      except ClientError:
                          access_policy = 'UNKNOWN'
                          public_access_config = {}
          
                      buckets_info.append({
                          'bucket_name': bucket_name,
                          'region': region,
                          'created': created,
                          'encryption_status': encryption_status,
                          'encryption_type': encryption_type,
                          'access_policy': access_policy,
                          'public_access_config': public_access_config
                      })
          
                  return {
                      'statusCode': 200,
                      'headers': {
                          'Access-Control-Allow-Origin': '*',
                          'Access-Control-Allow-Methods': 'GET,OPTIONS',
                          'Content-Type': 'application/json'
                      },
                      'body': json.dumps({
                          'buckets': buckets_info,
                          'count': len(buckets_info),
                          'timestamp': datetime.utcnow().isoformat() + 'Z'
                      })
                  }
          
              except Exception as e:
                  print(f"[ERROR] discover_s3_lambda failed: {str(e)}")
                  return {
                      'statusCode': 500,
                      'headers': {
                          'Access-Control-Allow-Origin': '*',
                          'Content-Type': 'application/json'
                      },
                      'body': json.dumps({
                          'error': 'Failed to discover S3 buckets',
                          'detail': str(e)
                      })
                  }

  RunCISChecksLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: run_cis_checks_lambda
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt CloudPostureScannerRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          AWS_REGION_TARGET: !Ref Region
          DYNAMODB_TABLE: scan_results
      Code:
        ZipFile: |
          import boto3
          import json
          import os
          from datetime import datetime, timezone
          from botocore.exceptions import ClientError
          
          REGION = os.environ.get('AWS_REGION_TARGET', 'us-east-1')
          TABLE_NAME = os.environ.get('DYNAMODB_TABLE', 'scan_results')
          
          
          def make_result(check_id, check_name, resource, resource_type, status, evidence):
              return {
                  'check_id': check_id,
                  'check_name': check_name,
                  'resource': resource,
                  'resource_type': resource_type,
                  'status': status,       # PASS | FAIL | ERROR
                  'evidence': evidence,
                  'timestamp': datetime.now(timezone.utc).isoformat()
              }
          
          
          def check_s3_public_access(s3):
              """CIS 2.1.5 - Ensure S3 buckets are not publicly accessible"""
              results = []
              try:
                  buckets = s3.list_buckets().get('Buckets', [])
                  for bucket in buckets:
                      name = bucket['Name']
                      try:
                          pab = s3.get_public_access_block(Bucket=name)
                          cfg = pab['PublicAccessBlockConfiguration']
                          blocked = all([
                              cfg.get('BlockPublicAcls', False),
                              cfg.get('BlockPublicPolicy', False),
                              cfg.get('IgnorePublicAcls', False),
                              cfg.get('RestrictPublicBuckets', False)
                          ])
                          status = 'PASS' if blocked else 'FAIL'
                          evidence = 'All 4 public access blocks are enabled' if blocked \
                              else f"Public access not fully blocked. Config: {cfg}"
                      except ClientError as e:
                          status = 'FAIL'
                          evidence = f"No public access block config found: {e.response['Error']['Code']}"
          
                      results.append(make_result(
                          'CIS-2.1.5', 'S3 Bucket Not Publicly Accessible',
                          name, 'S3', status, evidence
                      ))
              except Exception as e:
                  results.append(make_result(
                      'CIS-2.1.5', 'S3 Bucket Not Publicly Accessible',
                      'ALL_BUCKETS', 'S3', 'ERROR', str(e)
                  ))
              return results
          
          
          def check_s3_encryption(s3):
              """CIS 2.1.1 - Ensure all S3 buckets have server-side encryption"""
              results = []
              try:
                  buckets = s3.list_buckets().get('Buckets', [])
                  for bucket in buckets:
                      name = bucket['Name']
                      try:
                          enc = s3.get_bucket_encryption(Bucket=name)
                          algo = enc['ServerSideEncryptionConfiguration']['Rules'][0]\
                              ['ApplyServerSideEncryptionByDefault']['SSEAlgorithm']
                          status = 'PASS'
                          evidence = f'Encryption enabled with algorithm: {algo}'
                      except ClientError as e:
                          code = e.response['Error']['Code']
                          if code == 'ServerSideEncryptionConfigurationNotFoundError':
                              status = 'FAIL'
                              evidence = 'No server-side encryption configured on this bucket'
                          else:
                              status = 'ERROR'
                              evidence = f'API error: {code}'
          
                      results.append(make_result(
                          'CIS-2.1.1', 'S3 Server-Side Encryption Enabled',
                          name, 'S3', status, evidence
                      ))
              except Exception as e:
                  results.append(make_result(
                      'CIS-2.1.1', 'S3 Server-Side Encryption Enabled',
                      'ALL_BUCKETS', 'S3', 'ERROR', str(e)
                  ))
              return results
          
          
          def check_iam_root_mfa(iam):
              """CIS 1.5 - Ensure MFA is enabled for the root account"""
              try:
                  summary = iam.get_account_summary()['SummaryMap']
                  mfa_enabled = summary.get('AccountMFAEnabled', 0)
                  status = 'PASS' if mfa_enabled else 'FAIL'
                  evidence = 'Root account MFA is ENABLED' if mfa_enabled \
                      else 'CRITICAL: Root account MFA is NOT enabled. Enable immediately.'
                  return [make_result(
                      'CIS-1.5', 'Root Account MFA Enabled',
                      'aws-root-account', 'IAM', status, evidence
                  )]
              except Exception as e:
                  return [make_result(
                      'CIS-1.5', 'Root Account MFA Enabled',
                      'aws-root-account', 'IAM', 'ERROR', str(e)
                  )]
          
          
          def check_cloudtrail_enabled(ct):
              """CIS 3.1 - Ensure CloudTrail is enabled in all regions"""
              try:
                  trails = ct.describe_trails(includeShadowTrails=True).get('trailList', [])
                  if not trails:
                      return [make_result(
                          'CIS-3.1', 'CloudTrail Enabled',
                          'ALL_REGIONS', 'CloudTrail', 'FAIL',
                          'No CloudTrail trails found in this account'
                      )]
          
                  results = []
                  for trail in trails:
                      trail_name = trail['Name']
                      trail_arn = trail['TrailARN']
                      try:
                          status_resp = ct.get_trail_status(Name=trail_arn)
                          is_logging = status_resp.get('IsLogging', False)
                          status = 'PASS' if is_logging else 'FAIL'
                          evidence = f'Trail is actively logging' if is_logging \
                              else f'Trail exists but logging is DISABLED'
                      except Exception as e:
                          status = 'ERROR'
                          evidence = str(e)
          
                      results.append(make_result(
                          'CIS-3.1', 'CloudTrail Enabled and Logging',
                          trail_name, 'CloudTrail', status, evidence
                      ))
                  return results
              except Exception as e:
                  return [make_result(
                      'CIS-3.1', 'CloudTrail Enabled',
                      'ALL_REGIONS', 'CloudTrail', 'ERROR', str(e)
                  )]
          
          
          def check_sg_no_open_ssh_rdp(ec2):
              """CIS 5.2 - Ensure no security groups allow unrestricted SSH/RDP"""
              try:
                  sgs = ec2.describe_security_groups().get('SecurityGroups', [])
                  results = []
          
                  for sg in sgs:
                      sg_id = sg['GroupId']
                      sg_name = sg['GroupName']
                      open_ports = []
          
                      for rule in sg.get('IpPermissions', []):
                          from_port = rule.get('FromPort', -1)
                          to_port = rule.get('ToPort', -1)
          
                          # Check both IPv4 and IPv6 open ranges
                          open_ipv4 = any(r.get('CidrIp') == '0.0.0.0/0' for r in rule.get('IpRanges', []))
                          open_ipv6 = any(r.get('CidrIpv6') == '::/0' for r in rule.get('Ipv6Ranges', []))
          
                          if open_ipv4 or open_ipv6:
                              if from_port == -1 or (from_port <= 22 <= to_port):
                                  open_ports.append('SSH(22)')
                              if from_port == -1 or (from_port <= 3389 <= to_port):
                                  open_ports.append('RDP(3389)')
          
                      status = 'FAIL' if open_ports else 'PASS'
                      evidence = f'Unrestricted access to: {list(set(open_ports))}' if open_ports \
                          else 'No unrestricted SSH or RDP access found'
          
                      results.append(make_result(
                          'CIS-5.2', 'No Unrestricted SSH/RDP in Security Groups',
                          f'{sg_id} ({sg_name})', 'SecurityGroup', status, evidence
                      ))
                  return results
              except Exception as e:
                  return [make_result(
                      'CIS-5.2', 'No Unrestricted SSH/RDP in Security Groups',
                      'ALL_SECURITY_GROUPS', 'SecurityGroup', 'ERROR', str(e)
                  )]
          
          
          def store_results(results):
              """Write all check results to DynamoDB"""
              try:
                  dynamodb = boto3.resource('dynamodb')
                  table = dynamodb.Table(TABLE_NAME)
          
                  with table.batch_writer() as batch:
                      for r in results:
                          pk = f"{r['resource']}#{r['check_id']}"
                          batch.put_item(Item={
                              'resource_id': pk,
                              'timestamp': r['timestamp'],
                              'check_id': r['check_id'],
                              'check_name': r['check_name'],
                              'resource': r['resource'],
                              'resource_type': r['resource_type'],
                              'status': r['status'],
                              'evidence': r['evidence']
                          })
                  print(f"[INFO] Stored {len(results)} results to DynamoDB table: {TABLE_NAME}")
              except Exception as e:
                  print(f"[ERROR] DynamoDB write failed: {str(e)}")
          
          
          def lambda_handler(event, context):
              s3 = boto3.client('s3')
              iam = boto3.client('iam')
              ec2 = boto3.client('ec2', region_name=REGION)
              ct = boto3.client('cloudtrail', region_name=REGION)
          
              all_results = []
              all_results.extend(check_s3_public_access(s3))
              all_results.extend(check_s3_encryption(s3))
              all_results.extend(check_iam_root_mfa(iam))
              all_results.extend(check_cloudtrail_enabled(ct))
              all_results.extend(check_sg_no_open_ssh_rdp(ec2))
          
              store_results(all_results)
          
              passed = [r for r in all_results if r['status'] == 'PASS']
              failed = [r for r in all_results if r['status'] == 'FAIL']
              errors = [r for r in all_results if r['status'] == 'ERROR']
          
              return {
                  'statusCode': 200,
                  'headers': {
                      'Access-Control-Allow-Origin': '*',
                      'Access-Control-Allow-Methods': 'POST,OPTIONS',
                      'Content-Type': 'application/json'
                  },
                  'body': json.dumps({
                      'results': all_results,
                      'summary': {
                          'total': len(all_results),
                          'passed': len(passed),
                          'failed': len(failed),
                          'errors': len(errors),
                          'score_pct': round((len(passed) / len(all_results)) * 100) if all_results else 0
                      },
                      'timestamp': datetime.now(timezone.utc).isoformat()
                  })
              }

  GetResultsLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: get_results_lambda
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt CloudPostureScannerRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          DYNAMODB_TABLE: scan_results
      Code:
        ZipFile: |
          import boto3
          import json
          import os
          from boto3.dynamodb.conditions import Attr
          
          TABLE_NAME = os.environ.get('DYNAMODB_TABLE', 'scan_results')
          
          
          def lambda_handler(event, context):
              try:
                  dynamodb = boto3.resource('dynamodb')
                  table = dynamodb.Table(TABLE_NAME)
          
                  # Optional filter by status via query param: ?status=FAIL
                  params = event.get('queryStringParameters') or {}
                  filter_status = params.get('status', '').upper()
          
                  if filter_status in ('PASS', 'FAIL', 'ERROR'):
                      response = table.scan(FilterExpression=Attr('status').eq(filter_status))
                  else:
                      response = table.scan()
          
                  items = response.get('Items', [])
          
                  # Handle DynamoDB pagination
                  while 'LastEvaluatedKey' in response:
                      response = table.scan(ExclusiveStartKey=response['LastEvaluatedKey'])
                      items.extend(response.get('Items', []))
          
                  # Sort by timestamp descending
                  items.sort(key=lambda x: x.get('timestamp', ''), reverse=True)
          
                  passed = sum(1 for i in items if i.get('status') == 'PASS')
                  failed = sum(1 for i in items if i.get('status') == 'FAIL')
          
                  return {
                      'statusCode': 200,
                      'headers': {
                          'Access-Control-Allow-Origin': '*',
                          'Access-Control-Allow-Methods': 'GET,OPTIONS',
                          'Content-Type': 'application/json'
                      },
                      'body': json.dumps({
                          'results': items,
                          'summary': {
                              'total': len(items),
                              'passed': passed,
                              'failed': failed,
                              'score_pct': round((passed / len(items)) * 100) if items else 0
                          }
                      })
                  }
          
              except Exception as e:
                  print(f"[ERROR] get_results_lambda failed: {str(e)}")
                  return {
                      'statusCode': 500,
                      'headers': {
                          'Access-Control-Allow-Origin': '*',
                          'Content-Type': 'application/json'
                      },
                      'body': json.dumps({
                          'error': 'Failed to retrieve scan results',
                          'detail': str(e)
                      })
                  }

  # ----------------------------------------------------------
  # 4. API GATEWAY REST API
  # ----------------------------------------------------------
  CloudPostureAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: CloudPostureScannerAPI
      Description: REST API for Cloud Posture Scanner
      EndpointConfiguration:
        Types:
          - REGIONAL

  # /instances resource
  InstancesResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CloudPostureAPI
      ParentId: !GetAtt CloudPostureAPI.RootResourceId
      PathPart: instances

  InstancesGET:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CloudPostureAPI
      ResourceId: !Ref InstancesResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - LambdaArn: !GetAtt DiscoverEC2Lambda.Arn

  InstancesOPTIONS:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CloudPostureAPI
      ResourceId: !Ref InstancesResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # /buckets resource
  BucketsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CloudPostureAPI
      ParentId: !GetAtt CloudPostureAPI.RootResourceId
      PathPart: buckets

  BucketsGET:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CloudPostureAPI
      ResourceId: !Ref BucketsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - LambdaArn: !GetAtt DiscoverS3Lambda.Arn

  BucketsOPTIONS:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CloudPostureAPI
      ResourceId: !Ref BucketsResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # /cis-results resource
  CISResultsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CloudPostureAPI
      ParentId: !GetAtt CloudPostureAPI.RootResourceId
      PathPart: cis-results

  CISResultsGET:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CloudPostureAPI
      ResourceId: !Ref CISResultsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - LambdaArn: !GetAtt GetResultsLambda.Arn

  CISResultsOPTIONS:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CloudPostureAPI
      ResourceId: !Ref CISResultsResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # /scan resource
  ScanResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CloudPostureAPI
      ParentId: !GetAtt CloudPostureAPI.RootResourceId
      PathPart: scan

  ScanPOST:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CloudPostureAPI
      ResourceId: !Ref ScanResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations
          - LambdaArn: !GetAtt RunCISChecksLambda.Arn

  ScanOPTIONS:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CloudPostureAPI
      ResourceId: !Ref ScanResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # ----------------------------------------------------------
  # 5. LAMBDA PERMISSIONS (allow API Gateway to invoke)
  # ----------------------------------------------------------
  EC2LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt DiscoverEC2Lambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CloudPostureAPI}/*

  S3LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt DiscoverS3Lambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CloudPostureAPI}/*

  CISLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt RunCISChecksLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CloudPostureAPI}/*

  ResultsLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt GetResultsLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CloudPostureAPI}/*

  # ----------------------------------------------------------
  # 6. API GATEWAY DEPLOYMENT
  # ----------------------------------------------------------
  APIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - InstancesGET
      - InstancesOPTIONS
      - BucketsGET
      - BucketsOPTIONS
      - CISResultsGET
      - CISResultsOPTIONS
      - ScanPOST
      - ScanOPTIONS
    Properties:
      RestApiId: !Ref CloudPostureAPI

  APIStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref CloudPostureAPI
      DeploymentId: !Ref APIDeployment
      StageName: !Ref Stage
      Description: Production stage for Cloud Posture Scanner

# ============================================================
# OUTPUTS — shown in CloudFormation Console after deploy
# ============================================================
Outputs:

  APIGatewayURL:
    Description: "Paste this URL into the dashboard frontend"
    Value: !Sub "https://${CloudPostureAPI}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
    Export:
      Name: CloudPostureScannerAPIURL

  EC2Endpoint:
    Description: "GET EC2 instances"
    Value: !Sub "https://${CloudPostureAPI}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/instances"

  S3Endpoint:
    Description: "GET S3 buckets"
    Value: !Sub "https://${CloudPostureAPI}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/buckets"

  CISEndpoint:
    Description: "GET stored CIS results"
    Value: !Sub "https://${CloudPostureAPI}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/cis-results"

  ScanEndpoint:
    Description: "POST to trigger a new scan"
    Value: !Sub "https://${CloudPostureAPI}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/scan"

  DynamoDBTable:
    Description: "DynamoDB table storing scan results"
    Value: !Ref ScanResultsTable

  LambdaRoleARN:
    Description: "IAM role used by all Lambda functions"
    Value: !GetAtt CloudPostureScannerRole.Arn
